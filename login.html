<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Fashion Empire</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ---- FORGOT PASSWORD MODAL ---- */
.fp-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.fp-overlay.show { opacity: 1; pointer-events: all; }

.fp-box {
  background: white;
  border-radius: 22px;
  padding: 32px 28px;
  width: 100%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: fadeInUp 0.35s ease;
}
.fp-box h3 {
  font-size: 20px; font-weight: 700; margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px; color: #111;
}
.fp-box h3 i { color: #ff416c; }
.fp-box p { font-size: 13px; color: #888; margin-bottom: 22px; }
.fp-input-group {
  display: flex; align-items: center; gap: 12px;
  background: #f5f5f5; border-radius: 12px;
  padding: 13px 16px; margin-bottom: 16px;
}
.fp-input-group i { color: #ff416c; }
.fp-input-group input {
  border: none; background: transparent;
  font-family: 'Poppins', sans-serif; font-size: 14px;
  outline: none; width: 100%; color: #111;
}
.fp-send-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
  color: white; border: none; border-radius: 13px;
  font-family: 'Poppins', sans-serif; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.fp-send-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,65,108,0.35); }
.fp-cancel-btn {
  width: 100%; padding: 13px; margin-top: 10px;
  background: #f0f0f0; color: #555; border: none;
  border-radius: 13px; font-family: 'Poppins', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
}
.fp-cancel-btn:hover { background: #e0e0e0; }
.fp-msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
.fp-msg.success { color: #00a854; }
.fp-msg.error   { color: #e00; }

/* Forgot password link */
.forgot-link {
  text-align: right; margin-top: -4px; margin-bottom: 16px;
}
.forgot-link a {
  font-size: 13px; color: #ff416c; cursor: pointer;
  font-weight: 500; text-decoration: none;
}
.forgot-link a:hover { text-decoration: underline; }
</style>
</head>
<body class="auth-page">

<!-- FORGOT PASSWORD MODAL -->
<div class="fp-overlay" id="fpOverlay">
  <div class="fp-box">
    <h3><i class="fa-solid fa-lock-open"></i> Password Reset</h3>
    <p>Apna registered email daalo — hum reset link bhejenge.</p>
    <div class="fp-input-group">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="fpEmail" placeholder="Registered Email">
    </div>
    <button class="fp-send-btn" id="fpSendBtn" onclick="sendResetEmail()">
      <i class="fa-solid fa-paper-plane"></i>
      <span id="fpBtnText">Reset Link Bhejo</span>
    </button>
    <button class="fp-cancel-btn" onclick="closeForgotModal()">Cancel</button>
    <p class="fp-msg" id="fpMsg"></p>
  </div>
</div>

<!-- LOGIN BOX -->
<div class="auth-box" style="animation:fadeInUp 0.5s ease both;">
  <div class="auth-logo">
    <i class="fa-solid fa-crown"></i> FASHION EMPIRE
  </div>
  <h2>Welcome Back 👋</h2>
  <p class="auth-sub">Apne account mein login karein</p>

  <div class="input-group">
    <i class="fa-solid fa-envelope"></i>
    <input type="email" id="loginEmail" placeholder="Enter Email">
  </div>
  <div class="input-group">
    <i class="fa-solid fa-lock"></i>
    <input type="password" id="loginPassword" placeholder="Enter Password">
  </div>

  <!-- Forgot Password Link -->
  <div class="forgot-link">
    <a onclick="openForgotModal()">Password bhool gaye?</a>
  </div>

  <p id="loginError" class="auth-error" style="display:none;"></p>

  <button class="auth-btn" onclick="loginUser()">
    <span id="loginBtnText">Login</span>
  </button>

  <p class="auth-link">Account nahi hai? <a href="signup.html">Create Account</a></p>
  <p class="auth-link"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Store</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyBw6dKBEDGfuh-he23WHJGG-L6mRDH_lFo",
  authDomain: "fashion-empire-online.firebaseapp.com",
  projectId: "fashion-empire-online",
  storageBucket: "fashion-empire-online.firebasestorage.app",
  messagingSenderId: "270445447440",
  appId: "1:270445447440:web:17b31b34a0bbecbe87bd95"
});
const auth = getAuth(app);

/* ---- LOGIN ---- */
window.loginUser = async function(){
  let email    = document.getElementById("loginEmail").value.trim();
  let password = document.getElementById("loginPassword").value;
  let errEl    = document.getElementById("loginError");
  let btn      = document.getElementById("loginBtnText");

  errEl.style.display = "none";
  if(!email || !password){
    errEl.innerText = "Email aur password dono bharo.";
    errEl.style.display = "block"; return;
  }

  btn.innerText = "Logging in...";
  try {
    let userCred = await signInWithEmailAndPassword(auth, email, password);
    localStorage.setItem("fe_userName",  userCred.user.displayName || "User");
    localStorage.setItem("fe_userEmail", userCred.user.email);
    window.location.href = "index.html";
  } catch(err){
    btn.innerText = "Login";
    let msgs = {
      "auth/user-not-found":    "Email registered nahi hai.",
      "auth/wrong-password":    "Password galat hai.",
      "auth/invalid-email":     "Email format sahi nahi hai.",
      "auth/too-many-requests": "Bahut zyada attempts. Thodi der baad try karein.",
      "auth/invalid-credential":"Email ya password galat hai."
    };
    errEl.innerText = msgs[err.code] || "Login failed. Try again.";
    errEl.style.display = "block";
  }
};

/* ---- FORGOT PASSWORD ---- */
window.openForgotModal = function(){
  document.getElementById("fpOverlay").classList.add("show");
  document.getElementById("fpMsg").innerText = "";
  document.getElementById("fpMsg").className = "fp-msg";
  // Pre-fill email if already typed
  let email = document.getElementById("loginEmail").value.trim();
  if(email) document.getElementById("fpEmail").value = email;
  document.getElementById("fpEmail").focus();
};

window.closeForgotModal = function(){
  document.getElementById("fpOverlay").classList.remove("show");
  document.getElementById("fpMsg").innerText = "";
  document.getElementById("fpBtnText").innerText = "Reset Link Bhejo";
  document.getElementById("fpSendBtn").disabled = false;
};

window.sendResetEmail = async function(){
  let email  = document.getElementById("fpEmail").value.trim();
  let msgEl  = document.getElementById("fpMsg");
  let btnTxt = document.getElementById("fpBtnText");
  let btn    = document.getElementById("fpSendBtn");

  msgEl.innerText  = "";
  msgEl.className  = "fp-msg";

  if(!email){
    msgEl.innerText = "Email daalna zaroori hai.";
    msgEl.className = "fp-msg error";
    return;
  }

  btnTxt.innerText = "Sending...";
  btn.disabled     = true;

  try {
    await sendPasswordResetEmail(auth, email);
    msgEl.innerText = "✅ Reset link bhej diya gaya! Email check karo.";
    msgEl.className = "fp-msg success";
    btnTxt.innerText = "Link Bhej Diya ✓";
    // Auto close after 3s
    setTimeout(()=> window.closeForgotModal(), 3500);
  } catch(err){
    let msgs = {
      "auth/user-not-found":   "Ye email registered nahi hai.",
      "auth/invalid-email":    "Email format sahi nahi hai.",
      "auth/too-many-requests":"Zyada requests. Thodi der baad try karo."
    };
    msgEl.innerText  = msgs[err.code] || "Error aaya. Try again.";
    msgEl.className  = "fp-msg error";
    btnTxt.innerText = "Reset Link Bhejo";
    btn.disabled     = false;
  }
};

// Close modal on overlay click
document.getElementById("fpOverlay").addEventListener("click", function(e){
  if(e.target === this) window.closeForgotModal();
});

// Enter key support
document.addEventListener("keydown", e => {
  if(e.key === "Enter"){
    if(document.getElementById("fpOverlay").classList.contains("show")){
      window.sendResetEmail();
    } else {
      window.loginUser();
    }
  }
});
</script>
</body>
</html>
